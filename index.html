<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinemateca — Mi colección de cine en físico</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#0d1117; --bg2:#161b22; --bg3:#1f2630; --border:#2d3644;
  --txt:#e6edf3; --txt2:#9aa7b5; --acc:#e0a82e; --acc2:#c4901f;
  --green:#3fb950; --red:#f85149; --blue:#58a6ff; --purple:#bc8cff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.45}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;background:var(--bg3);color:var(--txt);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
a{color:var(--blue);text-decoration:none}
header{position:sticky;top:0;z-index:50;background:rgba(13,17,23,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.head-inner{max-width:1200px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-size:20px;font-weight:800;color:var(--acc);letter-spacing:.5px;white-space:nowrap}
.logo span{color:var(--txt)}
nav{display:flex;gap:4px;flex-wrap:wrap}
nav button{background:none;border:none;color:var(--txt2);padding:7px 12px;border-radius:8px;font-size:14px;font-weight:600}
nav button:hover{background:var(--bg3);color:var(--txt)}
nav button.active{background:var(--acc);color:#1a1a1a}
nav button .badge{background:var(--bg3);color:var(--txt2);border-radius:10px;padding:1px 7px;font-size:11px;margin-left:5px}
nav button.active .badge{background:rgba(0,0,0,.25);color:#1a1a1a}
main{max-width:1200px;margin:0 auto;padding:18px 16px 60px}
.tab{display:none}
.tab.active{display:block}
h2{font-size:19px;margin-bottom:14px}
h3{font-size:16px;margin:18px 0 10px;color:var(--acc)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.toolbar input[type=text]{flex:1;min-width:160px}
.btn{background:var(--acc);color:#1a1a1a;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:14px}
.btn:hover{background:var(--acc2)}
.btn2{background:var(--bg3);color:var(--txt);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-weight:600;font-size:14px}
.btn2:hover{border-color:var(--acc);color:var(--acc)}
.btn-sm{padding:4px 10px;font-size:12.5px;border-radius:6px}
.btn-danger{background:none;border:1px solid var(--border);color:var(--red);border-radius:8px;padding:6px 12px;font-size:13px}
.btn-danger:hover{border-color:var(--red)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .12s,border-color .12s;position:relative;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);border-color:var(--acc)}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg3)}
.card .noposter{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:40px;background:var(--bg3);color:var(--txt2)}
.card .cinfo{padding:8px 10px;flex:1;display:flex;flex-direction:column;gap:3px}
.card .ctitle{font-size:13.5px;font-weight:700;line-height:1.25}
.card .cmeta{font-size:12px;color:var(--txt2)}
.card .ribbons{position:absolute;top:6px;left:6px;right:6px;display:flex;justify-content:space-between;pointer-events:none}
.pill{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:6px;background:rgba(13,17,23,.85)}
.pill.seen{color:var(--green)}
.pill.unseen{color:var(--txt2)}
.pill.fmt{color:var(--acc)}
.pill.rate{color:var(--acc)}
.empty{text-align:center;color:var(--txt2);padding:50px 20px;border:1px dashed var(--border);border-radius:12px}
.empty .big{font-size:38px;margin-bottom:10px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{background:var(--bg3);border:1px solid var(--border);color:var(--txt2);border-radius:16px;padding:4px 12px;font-size:13px}
.chip.on{background:var(--acc);border-color:var(--acc);color:#1a1a1a;font-weight:700}
.statbar{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:16px;font-size:13.5px;color:var(--txt2)}
.statbar b{color:var(--txt);font-size:16px}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;overflow-y:auto;padding:30px 12px}
.modal-bg.open{display:block}
.modal{max-width:860px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:14px;position:relative}
.modal-close{position:absolute;top:10px;right:12px;background:rgba(13,17,23,.8);border:none;color:var(--txt);font-size:18px;width:34px;height:34px;border-radius:50%;z-index:5}
.modal-body{padding:22px}
.ficha-top{display:flex;gap:20px;flex-wrap:wrap}
.ficha-top img{width:200px;border-radius:10px;align-self:flex-start}
.ficha-info{flex:1;min-width:260px}
.ficha-info h2{margin-bottom:2px}
.sub{color:var(--txt2);font-size:13.5px;margin-bottom:10px}
.ratings{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
.rating-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;text-align:center;min-width:74px}
.rating-box .v{font-size:17px;font-weight:800;color:var(--acc)}
.rating-box .l{font-size:10.5px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.providers{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.providers img{width:38px;height:38px;border-radius:9px}
.cast-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.cast-card{min-width:90px;max-width:90px;text-align:center;font-size:11.5px}
.cast-card img,.cast-card .nopic{width:74px;height:74px;border-radius:50%;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;margin:0 auto 5px;font-size:22px;color:var(--txt2)}
.cast-card .nm{font-weight:700}
.cast-card .ch{color:var(--txt2)}
.shoplinks{display:flex;gap:8px;flex-wrap:wrap}
.shoplinks a{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--txt)}
.shoplinks a:hover{border-color:var(--acc);color:var(--acc)}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.ed-list{display:flex;flex-direction:column;gap:8px}
.ed-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.ed-item .ed-main{font-weight:700;font-size:14px}
.ed-item .ed-sub{font-size:12.5px;color:var(--txt2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.form-grid label{display:flex;flex-direction:column;gap:4px;font-size:12.5px;color:var(--txt2)}
.form-grid .full{grid-column:1/-1}
.list-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.list-row:hover{border-color:var(--acc)}
.list-row .ln{font-weight:700;font-size:15px}
.list-row .lc{font-size:12.5px;color:var(--txt2)}
.seccion{margin-bottom:28px}
.scroll-row{display:grid;grid-auto-flow:column;grid-auto-columns:150px;gap:12px;overflow-x:auto;padding-bottom:10px}
.note{background:var(--bg3);border-left:3px solid var(--acc);border-radius:6px;padding:10px 14px;font-size:13px;color:var(--txt2);margin:10px 0}
.settings-box{max-width:640px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.settings-box label{display:block;font-size:13px;color:var(--txt2);margin:12px 0 4px}
.settings-box input{width:100%}
#scanner-video{width:100%;max-height:320px;border-radius:10px;background:#000}
.tag{display:inline-block;background:var(--bg3);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--txt2);margin:0 4px 4px 0}
.watched-btn{position:absolute;bottom:64px;right:8px;z-index:3;background:rgba(13,17,23,.85);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;font-size:15px;display:flex;align-items:center;justify-content:center}
.pbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:5px}
.pbar>div{height:100%;background:var(--green)}
.ep-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);font-size:13.5px}
.ep-row:last-child{border-bottom:none}
.ep-row.future{opacity:.55}
.ep-row label{display:flex;gap:9px;align-items:center;cursor:pointer;flex:1;min-width:0}
.ep-row input[type=checkbox]{accent-color:var(--green);width:16px;height:16px;flex-shrink:0}
.ep-row .ed-sub{white-space:nowrap}
.season-eps{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin:6px 0 10px;max-height:340px;overflow-y:auto;display:none}
.season-eps.open{display:block}
.next-row{display:flex;gap:12px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.next-row:hover{border-color:var(--acc)}
.next-row img{width:42px;height:63px;object-fit:cover;border-radius:6px;background:var(--bg3)}
.next-row .when{margin-left:auto;text-align:right;font-size:12.5px;color:var(--acc);font-weight:700;white-space:nowrap}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .ficha-top img{width:140px}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="logo">🎬 CINE<span>MATECA</span> <span id="sync-dot" title="Sincronización desactivada" style="width:9px;height:9px;border-radius:50%;background:#555;display:inline-block;vertical-align:middle"></span></div>
    <nav id="nav"></nav>
  </div>
</header>
<main>
  <div id="tab-coleccion" class="tab"></div>
  <div id="tab-series" class="tab"></div>
  <div id="tab-wishlist" class="tab"></div>
  <div id="tab-listas" class="tab"></div>
  <div id="tab-buscar" class="tab"></div>
  <div id="tab-cartelera" class="tab"></div>
  <div id="tab-fisico" class="tab"></div>
  <div id="tab-ajustes" class="tab"></div>
</main>
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<script>
'use strict';
/* ============ ESTADO ============ */
const DEFAULTS = {collection:[],wishlist:[],lists:[],series:[],settings:{tmdbKey:'',omdbKey:'',region:'ES'}};
let S = load();
function load(){
  try{const d=JSON.parse(localStorage.getItem('cinemateca'))||{};return{...DEFAULTS,...d,settings:{...DEFAULTS.settings,...(d.settings||{})}};}
  catch(e){return JSON.parse(JSON.stringify(DEFAULTS));}
}
function save(skipSync){
  localStorage.setItem('cinemateca',JSON.stringify(S));
  if(!skipSync){localStorage.setItem('cinemateca_updated',Date.now());scheduleSync();}
  renderNav();
}
const FORMATOS=['Blu-ray','4K UHD','DVD','VHS','Otro'];
const EDICIONES=['Estándar','Steelbook','Digibook','Mediabook','Digipak','Slipcover','Coleccionista','Limitada','Pack/Box Set','Otra'];
const TMDB='https://api.themoviedb.org/3';
const IMG='https://image.tmdb.org/t/p/w342';
const IMGP='https://image.tmdb.org/t/p/w185';
const GENRES={28:'Acción',12:'Aventura',16:'Animación',35:'Comedia',80:'Crimen',99:'Documental',18:'Drama',10751:'Familia',14:'Fantasía',36:'Historia',27:'Terror',10402:'Música',9648:'Misterio',10749:'Romance',878:'Ciencia ficción',10770:'Película de TV',53:'Suspense',10752:'Bélica',37:'Western',10759:'Acción y aventura',10762:'Infantil',10763:'Noticias',10764:'Reality',10765:'Sci-Fi y fantasía',10766:'Telenovela',10767:'Talk show',10768:'Guerra y política'};
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function $(id){return document.getElementById(id);}
function toast(msg){
  let t=$('toast'); if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--acc);color:#1a1a1a;font-weight:700;padding:10px 20px;border-radius:10px;z-index:300;transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity='0',2200);
}
async function tmdb(path,params={}){
  if(!S.settings.tmdbKey) throw new Error('NOKEY');
  const u=new URL(TMDB+path);
  u.searchParams.set('api_key',S.settings.tmdbKey);
  u.searchParams.set('language','es-ES');
  for(const[k,v]of Object.entries(params))u.searchParams.set(k,v);
  const r=await fetch(u);
  if(!r.ok)throw new Error('TMDB '+r.status);
  return r.json();
}
function movieBase(m){
  return {id:m.id,title:m.title||m.name,originalTitle:m.original_title,year:(m.release_date||'').slice(0,4),
    poster:m.poster_path,tmdbRating:m.vote_average?+m.vote_average.toFixed(1):null,
    genres:(m.genre_ids||[]).map(g=>GENRES[g]).filter(Boolean).concat((m.genres||[]).map(g=>g.name)),
    country:(m.origin_country&&m.origin_country[0])||(m.production_countries&&m.production_countries[0]&&m.production_countries[0].iso_3166_1)||''};
}
function inCollection(id){return S.collection.find(m=>m.id===id);}
function inWishlist(id){return S.wishlist.find(m=>m.id===id);}

/* ============ NAVEGACIÓN ============ */
const TABS=[
  {id:'coleccion',label:'Colección',badge:()=>S.collection.length},
  {id:'series',label:'Series',badge:()=>S.series.length},
  {id:'wishlist',label:'Deseos',badge:()=>S.wishlist.length},
  {id:'listas',label:'Listas',badge:()=>S.lists.length},
  {id:'buscar',label:'🔍 Buscar'},
  {id:'cartelera',label:'Cartelera'},
  {id:'fisico',label:'Lanzamientos'},
  {id:'ajustes',label:'⚙️'}
];
let currentTab='coleccion';
function renderNav(){
  $('nav').innerHTML=TABS.map(t=>`<button class="${t.id===currentTab?'active':''}" onclick="showTab('${t.id}')">${t.label}${t.badge?`<span class="badge">${t.badge()}</span>`:''}</button>`).join('');
}
function showTab(id){
  currentTab=id;renderNav();
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  $('tab-'+id).classList.add('active');
  ({coleccion:renderColeccion,series:renderSeries,wishlist:renderWishlist,listas:renderListas,buscar:renderBuscar,cartelera:renderCartelera,fisico:renderFisico,ajustes:renderAjustes})[id]();
}
function closeModal(){$('modal-bg').classList.remove('open');}
function openModal(html){$('modal-body').innerHTML=html;$('modal-bg').classList.add('open');$('modal-bg').scrollTop=0;}

/* ============ TARJETAS ============ */
function cardHTML(m,opts={}){
  const ed=m.editions&&m.editions[0];
  const fmt=ed?esc(ed.format):'';
  const poster=m.poster?`<img loading="lazy" src="${IMG+m.poster}" alt="">`:`<div class="noposter">🎬</div>`;
  const watched=opts.showWatched?`<button class="watched-btn" title="Visto/No visto" onclick="event.stopPropagation();toggleWatched(${m.id})">${m.watched?'✅':'👁️'}</button>`:'';
  return `<div class="card" onclick="${m.tv?'openFichaTV':'openFicha'}(${m.id})">
    <div class="ribbons">
      ${m.tmdbRating?`<span class="pill rate">★ ${m.tmdbRating}</span>`:'<span></span>'}
      ${fmt?`<span class="pill fmt">${fmt}</span>`:(opts.showWatched?`<span class="pill ${m.watched?'seen':'unseen'}">${m.watched?'Vista':'Sin ver'}</span>`:'')}
    </div>
    ${poster}${watched}
    <div class="cinfo">
      <div class="ctitle">${esc(m.title)}</div>
      <div class="cmeta">${esc(m.year||'')}${m.country?' · '+esc(m.country):''}${ed&&ed.price?' · '+(+ed.price).toFixed(2)+' €':''}</div>
    </div>
  </div>`;
}

/* ============ COLECCIÓN ============ */
let colFilters={text:'',genre:'',format:'',watched:'',sort:'dateAdded',dir:-1};
function sortMovies(arr,sort,dir){
  const v=m=>{
    switch(sort){
      case 'title':return (m.title||'').toLowerCase();
      case 'year':return +m.year||0;
      case 'rating':return m.tmdbRating||0;
      case 'country':return m.country||'';
      case 'price':return m.editions&&m.editions.length?Math.min(...m.editions.map(e=>+e.price||Infinity)):Infinity;
      case 'format':return m.editions&&m.editions[0]?m.editions[0].format:'';
      default:return m.dateAdded||0;
    }
  };
  return [...arr].sort((a,b)=>{const x=v(a),y=v(b);return (x<y?-1:x>y?1:0)*dir;});
}
function filterControls(prefix,f,showFormat){
  const allGenres=[...new Set([...S.collection,...S.wishlist].flatMap(m=>m.genres||[]))].sort();
  return `<div class="toolbar">
    <input type="text" placeholder="Filtrar por título…" value="${esc(f.text)}" oninput="${prefix}F('text',this.value)">
    <select onchange="${prefix}F('genre',this.value)">
      <option value="">Género: todos</option>
      ${allGenres.map(g=>`<option ${f.genre===g?'selected':''}>${esc(g)}</option>`).join('')}
    </select>
    ${showFormat?`<select onchange="${prefix}F('format',this.value)">
      <option value="">Formato: todos</option>
      ${FORMATOS.map(x=>`<option ${f.format===x?'selected':''}>${x}</option>`).join('')}
    </select>
    <select onchange="${prefix}F('watched',this.value)">
      <option value="">Vistas y sin ver</option>
      <option value="1" ${f.watched==='1'?'selected':''}>Vistas</option>
      <option value="0" ${f.watched==='0'?'selected':''}>Sin ver</option>
    </select>`:''}
    <select onchange="${prefix}F('sort',this.value)">
      <option value="dateAdded" ${f.sort==='dateAdded'?'selected':''}>Orden: añadida</option>
      <option value="title" ${f.sort==='title'?'selected':''}>Título</option>
      <option value="year" ${f.sort==='year'?'selected':''}>Año</option>
      <option value="rating" ${f.sort==='rating'?'selected':''}>Nota</option>
      <option value="country" ${f.sort==='country'?'selected':''}>País</option>
      ${showFormat?`<option value="price" ${f.sort==='price'?'selected':''}>Precio</option>
      <option value="format" ${f.sort==='format'?'selected':''}>Formato</option>`:''}
    </select>
    <button class="btn2 btn-sm" onclick="${prefix}F('dir',null)" title="Invertir orden">${f.dir===1?'↑':'↓'}</button>
  </div>`;
}
function applyFilters(arr,f){
  return arr.filter(m=>
    (!f.text||(m.title||'').toLowerCase().includes(f.text.toLowerCase())) &&
    (!f.genre||(m.genres||[]).includes(f.genre)) &&
    (!f.format||(m.editions||[]).some(e=>e.format===f.format)) &&
    (f.watched===''||!!m.watched===(f.watched==='1'))
  );
}
function colF(k,v){if(k==='dir')colFilters.dir*=-1;else colFilters[k]=v;renderColeccion();}
function renderColeccion(){
  const el=$('tab-coleccion');
  const arr=sortMovies(applyFilters(S.collection,colFilters),colFilters.sort,colFilters.dir);
  const totalGasto=S.collection.flatMap(m=>m.editions||[]).reduce((s,e)=>s+(+e.price||0),0);
  const vistas=S.collection.filter(m=>m.watched).length;
  el.innerHTML=`
    <div class="toolbar"><h2 style="margin:0;flex:1">Mi colección</h2>
      <button class="btn" onclick="showTab('buscar')">＋ Añadir película</button>
      <button class="btn2" onclick="openScanner()">📷 Escanear código</button>
    </div>
    <div class="statbar">
      <span><b>${S.collection.length}</b> películas</span>
      <span><b>${S.collection.flatMap(m=>m.editions||[]).length}</b> ediciones</span>
      <span><b>${vistas}</b> vistas</span>
      <span>Valor: <b>${totalGasto.toFixed(2)} €</b></span>
    </div>
    ${filterControls('col',colFilters,true)}
    ${arr.length?`<div class="grid">${arr.map(m=>cardHTML(m,{showWatched:true})).join('')}</div>`

function newList(){
  const name=prompt('Nombre de la lista:');
  if(!name)return;
  S.lists.push({id:Date.now().toString(36),name,movies:[],sort:'dateAdded',dir:1});
  save();renderListas();
}
function deleteList(id){
  if(!confirm('¿Eliminar esta lista?'))return;
  S.lists=S.lists.filter(l=>l.id!==id);openListId=null;save();renderListas();
}
function listSort(id,v){const l=S.lists.find(x=>x.id===id);l.sort=v;save();renderListas();}
function addToList(movieData){
  if(!S.lists.length){toast('Primero crea una lista en la pestaña «Listas»');return;}
  const opts=S.lists.map((l,i)=>`${i+1}. ${l.name}`).join('\n');
  const n=prompt('¿A qué lista? Escribe el número:\n'+opts);
  const l=S.lists[parseInt(n)-1];
  if(!l)return;
  if(l.movies.find(m=>m.id===movieData.id)){toast('Ya está en esa lista');return;}
  l.movies.push({...movieData,dateAdded:Date.now()});
  save();toast('Añadida a «'+l.name+'»');
}

function editionFormHTML(movieId,ed={},idx=-1){
  return `<h3>${idx>=0?'Editar':'Nueva'} edición física</h3>
  <div class="form-grid">
    <label>Formato<select id="ed-format">${FORMATOS.map(f=>`<option ${ed.format===f?'selected':''}>${f}</option>`).join('')}</select></label>
    <label>Tipo de edición<select id="ed-type">${EDICIONES.map(f=>`<option ${ed.type===f?'selected':''}>${f}</option>`).join('')}</select></label>
    <label>Precio pagado (€)<input id="ed-price" type="number" step="0.01" min="0" value="${ed.price??''}"></label>
    <label>Tienda<input id="ed-store" type="text" placeholder="Fnac, Amazon…" value="${esc(ed.store||'')}"></label>
    <label>Código de barras (EAN)<input id="ed-barcode" type="text" value="${esc(ed.barcode||'')}"></label>
    <label>Nº de discos<input id="ed-discs" type="number" min="1" value="${ed.discs||1}"></label>
    <label class="full">Notas (extras, estado, idiomas…)<textarea id="ed-notes" rows="2">${esc(ed.notes||'')}</textarea></label>
  </div>
  <div class="actions">
    <button class="btn" onclick="saveEdition(${movieId},${idx})">Guardar</button>
    <button class="btn2" onclick="openFicha(${movieId})">Cancelar</button>
  </div>`;
}
let pendingMovie=null; // película aún no en colección al añadir edición
function saveEdition(movieId,idx){
  const ed={format:$('ed-format').value,type:$('ed-type').value,price:$('ed-price').value?+$('ed-price').value:null,
    store:$('ed-store').value.trim(),barcode:$('ed-barcode').value.trim(),discs:+$('ed-discs').value||1,notes:$('ed-notes').value.trim()};
  let m=inCollection(movieId);
  if(!m){
    if(!pendingMovie||pendingMovie.id!==movieId){toast('Error: película no encontrada');return;}
    m={...pendingMovie,watched:false,faRating:null,editions:[],dateAdded:Date.now()};
    S.collection.push(m);
    S.wishlist=S.wishlist.filter(w=>w.id!==movieId); // si estaba en deseos, sale
  }
  if(idx>=0)m.editions[idx]=ed;else m.editions.push(ed);
  save();toast('Edición guardada');openFicha(movieId);
}
function deleteEdition(movieId,idx){
  const m=inCollection(movieId);
  if(!m)return;
  m.editions.splice(idx,1);
  if(!m.editions.length&&confirm('Era la última edición. ¿Quitar la película de la colección?')){
    S.collection=S.collection.filter(x=>x.id!==movieId);save();closeModal();showTab('coleccion');return;
  }
  save();openFicha(movieId);
}
function removeFromCollection(id){
  if(!confirm('¿Quitar de la colección?'))return;
  S.collection=S.collection.filter(m=>m.id!==id);save();closeModal();showTab(currentTab);
}
function addToWishlist(data){
  if(inWishlist(data.id)){toast('Ya está en deseos');return;}
  S.wishlist.push({...data,dateAdded:Date.now()});
  save();toast('Añadida a deseos ❤️');
}
function removeFromWishlist(id){
  S.wishlist=S.wishlist.filter(m=>m.id!==id);save();toast('Quitada de deseos');closeModal();showTab(currentTab);
}

async function loadOmdb(imdbId){
  try{
    const r=await fetch(`https://www.omdbapi.com/?apikey=${S.settings.omdbKey}&i=${imdbId}`);
    const d=await r.json();
    if(d.Response!=='True')return;
    const set=(id,v)=>{const el=$(id);if(el&&v&&v!=='N/A'){el.style.display='';el.querySelector('.v').textContent=v;}};
    set('r-imdb',d.imdbRating);
    set('r-meta',d.Metascore);
    const rt=(d.Ratings||[]).find(x=>x.Source==='Rotten Tomatoes');
    set('r-rt',rt&&rt.Value);
  }catch(e){}
}
function setFaRating(id){
  const m=inCollection(id)||inWishlist(id);
  if(!m){toast('Añádela primero a colección o deseos para guardar la nota');return;}
  const v=prompt('Nota FilmAffinity (0–10):',m.faRating||'');
  if(v===null)return;
  m.faRating=v.trim()||null;save();openFicha(id);
}
function fichaLocalHTML(m){

    ${m.editions?`<div class="ed-list">${m.editions.map(e=>`<div class="ed-item"><div><div class="ed-main">${esc(e.format)} · ${esc(e.type)}</div><div class="ed-sub">${e.price!=null?(+e.price).toFixed(2)+' €':''}</div></div></div>`).join('')}</div>`:''}

async function renderCartelera(){
  const el=$('tab-cartelera');
  el.innerHTML='<h2>Cartelera</h2><div style="color:var(--txt2)">Cargando…</div>';
  if(!S.settings.tmdbKey){el.innerHTML='<h2>Cartelera</h2><div class="note">⚠️ Configura tu clave de TMDB en <b>⚙️ Ajustes</b>.</div>';return;}
  try{
    const reg=S.settings.region;
    const [now,up]=await Promise.all([
      tmdb('/movie/now_playing',{region:reg}),
      tmdb('/movie/upcoming',{region:reg})
    ]);
    const today=new Date().toISOString().slice(0,10);
    const upcoming=up.results.filter(m=>m.release_date>today);
    el.innerHTML=`<h2>Cartelera (${reg})</h2>
      <div class="seccion"><h3>🎟️ En cines ahora</h3>
        <div class="scroll-row">${now.results.map(m=>cardHTML(movieBase(m))).join('')}</div></div>
      <div class="seccion"><h3>📅 Próximos estrenos</h3>
        ${upcoming.length?`<div class="scroll-row">${upcoming.map(m=>{const b=movieBase(m);return cardHTML({...b,year:fmtDate(m.release_date)});}).join('')}</div>`:'<p style="color:var(--txt2)">Sin datos de próximos estrenos.</p>'}</div>`;
  }catch(e){el.innerHTML='<h2>Cartelera</h2><div class="empty">Error cargando la cartelera: '+esc(e.message)+'</div>';}
}
function fmtDate(d){
  if(!d)return'';
  const[y,m,day]=d.split('-');
  return `${+day} ${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][+m-1]} ${y}`;
}

async function renderFisico(){

  const reg=S.settings.region;
  const d=new Date(),iso=x=>x.toISOString().slice(0,10);

  const disc=p=>tmdb('/discover/movie',{with_release_type:'5',region:reg,sort_by:'release_date.desc',...p});
  try{
    const [semana,proximos]=await Promise.all([

    el.innerHTML=`<h2>Lanzamientos en físico (${reg})</h2>

        ${semana.results.length?`<div class="scroll-row">${semana.results.map(m=>cardHTML(movieBase(m))).join('')}</div>`:'<p style="color:var(--txt2)">Sin novedades registradas esta semana.</p>'}</div>

/* ============ ESCÁNER ============ */
let scanStream=null,scanTimer=null;
function openScanner(){
  const supported='BarcodeDetector' in window;
  openModal(`<h3 style="margin-top:0">📷 Escanear código de barras</h3>
    ${supported?`<video id="scanner-video" autoplay playsinline muted></video>
      <p style="font-size:13px;color:var(--txt2);margin-top:8px">Apunta al código EAN de la carátula. Si la cámara no se activa, abre la app desde <b>http://localhost</b> o HTTPS (requisito del navegador).</p>`
      :`<div class="note">Tu navegador no soporta detección de códigos (usa Chrome/Edge). Puedes introducir el EAN a mano:</div>`}
    <div class="toolbar" style="margin-top:10px">
      <input type="text" id="ean-input" placeholder="O escribe el EAN aquí…" onkeydown="if(event.key==='Enter')lookupEAN(this.value)">
      <button class="btn" onclick="lookupEAN($('ean-input').value)">Buscar EAN</button>
    </div>
    <div id="scan-result"></div>`);
  if(supported)startScan();
}
async function startScan(){
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=$('scanner-video');v.srcObject=scanStream;
    const det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a']});
    scanTimer=setInterval(async()=>{
      if(!v.videoWidth)return;
      try{
        const codes=await det.detect(v);
        if(codes.length){stopScan(false);$('ean-input').value=codes[0].rawValue;lookupEAN(codes[0].rawValue);}
      }catch(e){}
    },400);
  }catch(e){
    const r=$('scan-result');if(r)r.innerHTML='<div class="note">No se pudo acceder a la cámara ('+esc(e.name)+'). Introduce el EAN a mano o abre la app vía localhost/HTTPS.</div>';
  }
}
function stopScan(closeVideo=true){
  if(scanTimer){clearInterval(scanTimer);scanTimer=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  if(closeVideo){const v=$('scanner-video');if(v)v.srcObject=null;}
}
const _closeModal=closeModal;
closeModal=function(){stopScan();_closeModal();};
async function lookupEAN(ean){
  ean=(ean||'').trim();
  if(!ean)return;
  const box=$('scan-result');
  box.innerHTML='<div style="color:var(--txt2);padding:12px">Consultando EAN '+esc(ean)+'…</div>';
  let title='';
  try{
    const r=await fetch('https://api.upcitemdb.com/prod/trial/lookup?upc='+encodeURIComponent(ean));
    const d=await r.json();
    if(d.items&&d.items.length)title=d.items[0].title||'';
  }catch(e){}
  if(title){
    // limpia sufijos típicos: [Blu-ray], (4K UHD), etc.
    const clean=title.replace(/[\[\(].*?[\]\)]/g,'').replace(/blu-?ray|4k|uhd|dvd|edición.*$|steelbook/gi,'').trim();
    box.innerHTML=`<div class="note">Producto: <b>${esc(title)}</b><br>Buscando «${esc(clean)}» en TMDB… <em>Recuerda guardar el EAN ${esc(ean)} en la edición.</em></div>`;
    try{
      const d=await tmdb('/search/movie',{query:clean});
      if(d.results.length){box.innerHTML+=`<div class="grid" style="margin-top:10px">${d.results.slice(0,8).map(m=>cardHTML(movieBase(m))).join('')}</div>`;return;}
    }catch(e){}
    box.innerHTML+='<div class="empty" style="margin-top:10px">Sin coincidencias en TMDB. Prueba la búsqueda manual.</div>';
  }else{
    box.innerHTML=`<div class="note">No se encontró el EAN <b>${esc(ean)}</b> en la base de datos de códigos (límite gratuito o producto no registrado).<br>Busca la película por título y guarda el EAN en su edición para futuras consultas.</div>
    <div class="toolbar" style="margin-top:8px"><input type="text" id="ean-title" placeholder="Título de la película…" onkeydown="if(event.key==='Enter'){closeModal();showTab('buscar');setTimeout(()=>{$('search-input').value=this.value;doSearch(this.value)},100)}">
    <button class="btn" onclick="const v=$('ean-title').value;closeModal();showTab('buscar');setTimeout(()=>{$('search-input').value=v;doSearch(v)},100)">Buscar título</button></div>`;
  }
}

/* ============ SERIES (tipo TV Time) ============ */
function inSeries(id){return S.series.find(s=>s.id===id);}
function tvBase(m){
  return {id:m.id,tv:true,title:m.name,originalTitle:m.original_name,year:(m.first_air_date||'').slice(0,4),
    poster:m.poster_path,tmdbRating:m.vote_average?+m.vote_average.toFixed(1):null,
    genres:(m.genre_ids||[]).map(g=>GENRES[g]).filter(Boolean).concat((m.genres||[]).map(g=>g.name)),
    country:(m.origin_country||[])[0]||''};
}
function epKey(s,e){return s+'x'+e;}
function todayISO(){return new Date().toISOString().slice(0,10);}
function seriesStats(rec){
  const watched=Object.keys(rec.eps||{}).length;
  const total=rec.totalEps||0;
  const upToDate=rec.lastEp?!!((rec.eps||{})[epKey(rec.lastEp.s,rec.lastEp.e)]):(total>0&&watched>=total);
  return {watched,total,upToDate};
}
function tvStatus(s){return {'Returning Series':'En emisión','In Production':'En producción','Planned':'Anunciada','Ended':'Finalizada','Canceled':'Cancelada','Pilot':'Piloto'}[s]||s||'';}
function daysUntil(dateStr){
  const d=Math.round((new Date(dateStr)-new Date(todayISO()))/864e5);
  return d<=0?'hoy':d===1?'mañana':'en '+d+' días';
}
async function refreshSeriesRec(rec,d){
  d=d||await tmdb('/tv/'+rec.id);
  rec.title=d.name;rec.poster=d.poster_path;rec.year=(d.first_air_date||'').slice(0,4);
  rec.tmdbRating=d.vote_average?+d.vote_average.toFixed(1):null;
  rec.genres=(d.genres||[]).map(g=>g.name);
  rec.country=(d.origin_country||[])[0]||'';
  rec.status=d.status;
  rec.totalEps=d.number_of_episodes||0;
  rec.seasonsMeta=(d.seasons||[]).filter(s=>s.season_number>0).map(s=>({n:s.season_number,count:s.episode_count,name:s.name}));
  const nx=d.next_episode_to_air,lx=d.last_episode_to_air;
  rec.nextEp=nx?{s:nx.season_number,e:nx.episode_number,name:nx.name,airDate:nx.air_date}:null;
  rec.lastEp=lx?{s:lx.season_number,e:lx.episode_number,name:lx.name,airDate:lx.air_date}:null;
  rec.fetchedAt=Date.now();
}
async function followSeries(base){
  if(inSeries(base.id)){toast('Ya sigues esta serie');return;}
  const rec={...base,tv:true,eps:{},faRating:null,dateAdded:Date.now()};
  S.series.push(rec);
  try{await refreshSeriesRec(rec);}catch(e){}
  save();toast('Siguiendo «'+rec.title+'» 📺');
  openFichaTV(base.id);
}
function unfollowSeries(id){
  if(!confirm('¿Dejar de seguir esta serie? Se perderá el registro de capítulos vistos.'))return;
  S.series=S.series.filter(s=>s.id!==id);
  save();closeModal();if(currentTab==='series')renderSeries();
}
function seriesCardHTML(rec){
  const {watched,total,upToDate}=seriesStats(rec);
  const pct=total?Math.min(100,Math.round(watched/total*100)):0;
  const poster=rec.poster?`<img loading="lazy" src="${IMG+rec.poster}" alt="">`:`<div class="noposter">📺</div>`;
  return `<div class="card" onclick="openFichaTV(${rec.id})">
    <div class="ribbons">
      ${rec.tmdbRating?`<span class="pill rate">★ ${rec.tmdbRating}</span>`:'<span></span>'}
      <span class="pill ${upToDate?'seen':'unseen'}">${upToDate?'Al día':(total-watched)+' pend.'}</span>
    </div>
    ${poster}
    <div class="cinfo">
      <div class="ctitle">${esc(rec.title)}</div>
      <div class="cmeta">${esc(rec.year||'')}${rec.status?' · '+tvStatus(rec.status):''}</div>
      <div class="cmeta">${watched}/${total} capítulos</div>
      <div class="pbar"><div style="width:${pct}%"></div></div>
    </div>
  </div>`;
}
let seriesRefreshing=false;
async function renderSeries(){
  const el=$('tab-series');
  const hoy=todayISO();
  const hace7=new Date(Date.now()-7*864e5).toISOString().slice(0,10);
  // Próximos capítulos de series seguidas
  const upcoming=S.series.filter(r=>r.nextEp&&r.nextEp.airDate&&r.nextEp.airDate>=hoy)
    .sort((a,b)=>a.nextEp.airDate<b.nextEp.airDate?-1:1);
  // Capítulos recién emitidos (últimos 7 días) aún sin ver
  const recientes=S.series.filter(r=>r.lastEp&&r.lastEp.airDate>=hace7&&r.lastEp.airDate<=hoy&&!(r.eps||{})[epKey(r.lastEp.s,r.lastEp.e)]);
  const pendientes=S.series.filter(r=>!seriesStats(r).upToDate).sort((a,b)=>a.title.localeCompare(b.title));
  const alDia=S.series.filter(r=>seriesStats(r).upToDate).sort((a,b)=>a.title.localeCompare(b.title));
  const totalVistos=S.series.reduce((s,r)=>s+Object.keys(r.eps||{}).length,0);
  el.innerHTML=`
    <div class="toolbar"><h2 style="margin:0;flex:1">Mis series</h2>
      <button class="btn" onclick="setSearchType('tv');showTab('buscar')">＋ Seguir serie</button>
    </div>
    <div class="statbar">
      <span><b>${S.series.length}</b> series</span>
      <span><b>${totalVistos}</b> capítulos vistos</span>
      <span><b>${pendientes.length}</b> con pendientes</span>
    </div>
    ${!S.series.length?`<div class="empty"><div class="big">📺</div>No sigues ninguna serie todavía.<br>Busca una serie y pulsa «Seguir» para registrar los capítulos que ves.</div>`:`
    ${recientes.length?`<div class="seccion"><h3>🔔 Capítulos nuevos (últimos 7 días)</h3>
      ${recientes.map(r=>`<div class="next-row" onclick="openFichaTV(${r.id})">
        ${r.poster?`<img src="${IMGP+r.poster}">`:'<div class="noposter" style="width:42px;height:63px;font-size:18px;border-radius:6px">📺</div>'}
        <div><b>${esc(r.title)}</b><div style="font-size:12.5px;color:var(--txt2)">${r.lastEp.s}x${String(r.lastEp.e).padStart(2,'0')} · ${esc(r.lastEp.name||'')}</div></div>
        <div class="when">¡Ya disponible!<br>${fmtDate(r.lastEp.airDate)}</div>
      </div>`).join('')}</div>`:''}
    ${upcoming.length?`<div class="seccion"><h3>📅 Próximas emisiones</h3>
      ${upcoming.map(r=>`<div class="next-row" onclick="openFichaTV(${r.id})">
        ${r.poster?`<img src="${IMGP+r.poster}">`:'<div class="noposter" style="width:42px;height:63px;font-size:18px;border-radius:6px">📺</div>'}
        <div><b>${esc(r.title)}</b><div style="font-size:12.5px;color:var(--txt2)">${r.nextEp.s}x${String(r.nextEp.e).padStart(2,'0')} · ${esc(r.nextEp.name||'')}</div></div>
        <div class="when">${daysUntil(r.nextEp.airDate)}<br>${fmtDate(r.nextEp.airDate)}</div>
      </div>`).join('')}</div>`:''}
    ${pendientes.length?`<div class="seccion"><h3>▶️ Con capítulos pendientes</h3>
      <div class="grid">${pendientes.map(seriesCardHTML).join('')}</div></div>`:''}
    ${alDia.length?`<div class="seccion"><h3>✅ Al día</h3>
      <div class="grid">${alDia.map(seriesCardHTML).join('')}</div></div>`:''}
    `}`;
  // refresco en segundo plano (datos con más de 12 h)
  if(!seriesRefreshing&&S.settings.tmdbKey){
    const stale=S.series.filter(r=>!r.fetchedAt||Date.now()-r.fetchedAt>12*3600e3);
    if(stale.length){
      seriesRefreshing=true;
      Promise.allSettled(stale.map(r=>refreshSeriesRec(r))).then(()=>{
        seriesRefreshing=false;save();
        if(currentTab==='series')renderSeries();
      });
    }
  }
}

async function toggleSeasonEps(id,n){
  const box=$(`eps-${id}-${n}`);
  if(box.classList.contains('open')){box.classList.remove('open');return;}
  box.classList.add('open');
  if(!seasonCache[id+'-'+n]){
    box.innerHTML='<div style="padding:12px;color:var(--txt2)">Cargando capítulos…</div>';
    try{
      const d=await tmdb(`/tv/${id}/season/${n}`);
      seasonCache[id+'-'+n]=d.episodes||[];
    }catch(e){box.innerHTML='<div style="padding:12px;color:var(--txt2)">Error cargando capítulos.</div>';return;}
  }
  renderSeasonEps(id,n);
}
function renderSeasonEps(id,n){
  const box=$(`eps-${id}-${n}`);
  if(!box)return;
  const eps=seasonCache[id+'-'+n]||[];
  const rec=inSeries(id);
  const hoy=todayISO();
  box.innerHTML=eps.map(e=>{
    const aired=e.air_date&&e.air_date<=hoy;
    const k=epKey(n,e.episode_number);
    const done=rec&&(rec.eps||{})[k];
    return `<div class="ep-row ${aired?'':'future'}">
      <label><input type="checkbox" ${done?'checked':''} ${(!aired||!rec)?'disabled':''} onchange="toggleEp(${id},${n},${e.episode_number})">
        <span><b>${n}x${String(e.episode_number).padStart(2,'0')}</b> ${esc(e.name||'')}</span></label>
      ${rec&&aired?`<button class="btn2 btn-sm" title="Marcar vistos hasta aquí" onclick="markUpTo(${id},${n},${e.episode_number})">⤒</button>`:''}
      <span class="ed-sub">${e.air_date?(aired?fmtDate(e.air_date):'📅 '+fmtDate(e.air_date)):'sin fecha'}</span>
    </div>`;
  }).join('')||'<div style="padding:12px;color:var(--txt2)">Sin capítulos.</div>';
}
function updateTvCounters(id){
  const rec=inSeries(id);
  if(!rec)return;
  const st=seriesStats(rec);
  const c=$(`tv-count-${id}`);
  if(c)c.textContent=st.watched+'/'+st.total;
  (rec.seasonsMeta||[]).forEach(s=>{
    const el=$(`scount-${id}-${s.n}`);
    if(el)el.textContent=Object.keys(rec.eps||{}).filter(k=>k.startsWith(s.n+'x')).length;
  });
}
function toggleEp(id,s,e){
  const rec=inSeries(id);
  if(!rec)return;
  const k=epKey(s,e);
  if(rec.eps[k])delete rec.eps[k];else rec.eps[k]=1;
  save();updateTvCounters(id);
}
async function markSeason(id,n){
  const rec=inSeries(id);
  if(!rec)return;
  if(!seasonCache[id+'-'+n]){
    try{const d=await tmdb(`/tv/${id}/season/${n}`);seasonCache[id+'-'+n]=d.episodes||[];}
    catch(e){toast('Error cargando la temporada');return;}
  }
  const hoy=todayISO();
  seasonCache[id+'-'+n].forEach(e=>{if(e.air_date&&e.air_date<=hoy)rec.eps[epKey(n,e.episode_number)]=1;});
  save();updateTvCounters(id);renderSeasonEps(id,n);
  toast('Temporada '+n+' marcada como vista');
}
function markUpTo(id,s,e){
  const rec=inSeries(id);
  if(!rec)return;
  (rec.seasonsMeta||[]).filter(x=>x.n<s).forEach(x=>{
    for(let i=1;i<=x.count;i++)rec.eps[epKey(x.n,i)]=1;
  });
  for(let i=1;i<=e;i++)rec.eps[epKey(s,i)]=1;
  save();updateTvCounters(id);renderSeasonEps(id,s);
  toast('Marcados vistos hasta '+s+'x'+String(e).padStart(2,'0'));
}

/* ============ IMPORTAR LISTA DE TÍTULOS ============ */
function normFormat(f){
  f=(f||'').toLowerCase();
  if(f.includes('4k')||f.includes('uhd'))return '4K UHD';
  if(f.includes('blu'))return 'Blu-ray';
  if(f.includes('dvd'))return 'DVD';
  if(f.includes('vhs'))return 'VHS';
  return 'Blu-ray';
}
function parseTitleLines(text){
  return text.split(/\n+/).map(l=>l.trim()).filter(Boolean).map(l=>{
    let title='',format='';
    if(l.includes('\t')){const p=l.split('\t');title=p[0].trim();format=(p.slice(1).join(' ')).trim();}
    else{
      const m=l.match(/^(.*?)\s+(4K\s*UHD|4K|UHD|Blu-?Ray|DVD|VHS)\s*$/i);
      if(m){title=m[1].trim();format=m[2];}
      else{const m2=l.match(/^(.*?)[ ]{2,}(.+)$/);if(m2){title=m2[1].trim();format=m2[2];}else title=l;}
    }
    return {title,format:normFormat(format)};
  }).filter(x=>x.title&&!/^t[íi]tulo/i.test(x.title));
}
function cleanImportTitle(raw){
  let t=raw,year=null;
  const ym=t.match(/\((19|20)\d{2}\)/);
  if(ym){year=ym[0].slice(1,5);t=t.replace(ym[0],' ');}
  let type='Estándar';
  if(/steelbook/i.test(t))type='Steelbook';
  else if(/\(\s*\d\s*(?:-|y|a)\s*\d\s*\)|trilog[íi]a|\bpack\b|\bsaga\b|partes?\s+\d/i.test(t))type='Pack/Box Set';
  else if(/aniversario|ed\.?\s*esp|edici[oó]n\s+especial|final\s+cut|extendida|montaje del director|director'?s cut/i.test(t))type='Coleccionista';
  t=t.replace(/\(.*?\)/g,' ')
     .replace(/\s*[-–]?\s*steelbook/ig,' ')
     .replace(/\s*[-–]\s*\d+\s*aniversario/ig,' ')
     .replace(/\d+\s*aniversario/ig,' ')
     .replace(/ed\.?\s*esp\.?/ig,' ')
     .replace(/edici[oó]n\s+especial/ig,' ')
     .replace(/:?\s*final\s+cut/ig,' ')
     .replace(/partes?\s+\d+(\s*y\s*\d+)?/ig,' ')
     .replace(/trilog[íi]a( original)?/ig,' ')
     .replace(/\s+/g,' ').replace(/[:\-–,]\s*$/,'').trim();
  return {query:t||raw,year,type,notes:t!==raw.trim()?raw.trim():''};
}

/* ============ IMPORTAR TV TIME ============ */
async function tmdbFind(ids){
  if(ids&&ids.tvdb){
    try{
      const r=await tmdb('/find/'+ids.tvdb,{external_source:'tvdb_id'});
      if((r.tv_results&&r.tv_results.length)||(r.movie_results&&r.movie_results.length))return r;
    }catch(e){}
  }
  if(ids&&ids.imdb){
    try{return await tmdb('/find/'+ids.imdb,{external_source:'imdb_id'});}catch(e){}
  }
  return null;
}
async function pool(items,worker,concurrency,onProgress){
  let i=0,done=0;const fails=[];
  async function run(){
    while(i<items.length){
      const idx=i++;
      try{await worker(items[idx]);}
      catch(e){fails.push(items[idx].title||'?');}
      done++;if(onProgress)onProgress(done,items.length,fails);
    }
  }
  await Promise.all(Array.from({length:Math.min(concurrency,items.length)},run));
  return fails;
}
async function importTVTime(){
  const files=$('tvt-files').files;
  const box=$('tvt-progress');
  if(!files.length){toast('Selecciona primero los archivos JSON');return;}
  if(!S.settings.tmdbKey){toast('Configura antes tu clave de TMDB');return;}
  let movies=[],series=[];
  for(const f of files){
    try{
      const d=JSON.parse(await f.text());
      if(!Array.isArray(d)){box.innerHTML='<div class="note">⚠️ '+esc(f.name)+' no parece un export de TV Time.</div>';return;}
      for(const it of d)(it.seasons?series:movies).push(it);
    }catch(e){box.innerHTML='<div class="note">⚠️ No se pudo leer '+esc(f.name)+'.</div>';return;}
  }
  await runTVTimeImport(movies,series,{
    skipStopped:$('tvt-skip-stopped').checked,
    skipEmpty:$('tvt-skip-empty').checked
  },box);
}
async function runTVTimeImport(movies,series,opts,box){
  const wEps=s=>(s.seasons||[]).reduce((n,se)=>n+(se.is_specials?0:(se.episodes||[]).filter(e=>e.is_watched).length),0);
  series=series.filter(s=>!(opts.skipStopped&&s.status==='stopped')&&!(opts.skipEmpty&&wEps(s)===0));
  const upd=phase=>(d,t,f)=>{box.innerHTML=`<div class="note">⏳ ${phase}: <b>${d}/${t}</b>${f.length?' · no encontradas: '+f.length:''}<br><span style="font-size:12px">No cierres esta pestaña.</span></div>`;};
  let addedEps=0;
  const failsS=await pool(series,async s=>{
    const found=await tmdbFind(s.id);
    const tv=found&&found.tv_results&&found.tv_results[0];
    if(!tv)throw new Error('notfound');
    let rec=inSeries(tv.id);
    if(!rec){rec={...tvBase(tv),tv:true,eps:{},faRating:null,dateAdded:Date.now()};S.series.push(rec);}
    for(const se of (s.seasons||[])){
      if(se.is_specials)continue;
      for(const e of (se.episodes||[]))if(e.is_watched&&!rec.eps[epKey(se.number,e.number)]){rec.eps[epKey(se.number,e.number)]=1;addedEps++;}
    }
    try{await refreshSeriesRec(rec);}catch(e){}
  },6,upd('Importando series'));
  save();
  const getList=name=>{
    let l=S.lists.find(x=>x.name===name);
    if(!l){l={id:Date.now().toString(36)+'-'+S.lists.length,name,movies:[],sort:'dateAdded',dir:1};S.lists.push(l);}
    return l;
  };
  let failsM=[];
  if(movies.length){
    const listV=getList('Vistas (TV Time)'),listP=getList('Pendientes (TV Time)');
    failsM=await pool(movies,async m=>{
      const found=await tmdbFind(m.id);
      const mv=found&&found.movie_results&&found.movie_results[0];
      if(!mv)throw new Error('notfound');
      const base=movieBase(mv);
      const l=m.is_watched?listV:listP;
      if(!l.movies.find(x=>x.id===base.id))l.movies.push({...base,dateAdded:Date.now()});
      const c=inCollection(base.id);
      if(c&&m.is_watched)c.watched=true;
    },6,upd('Importando películas'));
    save();
  }
  const fails=[...failsS,...failsM];
  box.innerHTML=`<div class="note">✅ <b>Importación completada.</b><br>
    Series: ${series.length-failsS.length}/${series.length} · Capítulos vistos añadidos: ${addedEps}<br>
    Películas: ${movies.length-failsM.length}/${movies.length} (en las listas «Vistas (TV Time)» y «Pendientes (TV Time)»)
    ${fails.length?`<br>⚠️ Sin correspondencia en TMDB (${fails.length}): ${esc(fails.slice(0,15).join(', '))}${fails.length>15?'…':''}`:''}
  </div>`;
  toast('Importación de TV Time completada 🎉');
}

function supaCfg(){

async function supaAuth(path,body){
  const c=supaCfg();
  if(!c)throw new Error('Configura antes la URL y la clave de Supabase');
  const r=await fetch(c.u+'/auth/v1/'+path,{method:'POST',headers:{apikey:c.k,'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.msg||d.error_description||d.message||('HTTP '+r.status));
  return d;
}
function setSession(d){
  session={access_token:d.access_token,refresh_token:d.refresh_token,
    email:d.user&&d.user.email,sub:d.user&&d.user.id,
    exp:Date.now()+(((d.expires_in||3600)-60)*1000)};
  localStorage.setItem('cinemateca_session',JSON.stringify(session));
}
async function ensureToken(){
  if(!session)return null;
  if(Date.now()<session.exp)return session;
  try{
    const d=await supaAuth('token?grant_type=refresh_token',{refresh_token:session.refresh_token});
    setSession(d);return session;
  }catch(e){
    session=null;localStorage.removeItem('cinemateca_session');
    syncStatus='off';updateSyncUI();return null;
  }
}
async function supaRest(method,qs,body,prefer){
  const c=supaCfg();const s=await ensureToken();
  if(!c||!s)throw new Error('sin sesión');
  const r=await fetch(c.u+'/rest/v1/cinemateca'+qs,{method,
    headers:{apikey:c.k,Authorization:'Bearer '+s.access_token,'Content-Type':'application/json',...(prefer?{Prefer:prefer}:{})},
    body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.status===204?null:r.json();
}

    localStorage.setItem('cinemateca_lastsync',Date.now());
    syncStatus='ok';
  }catch(e){syncStatus='err';}

}
async function pullSync(force){
  if(!session||!supaCfg())return;
  syncStatus='sync';updateSyncUI();
  try{
    const rows=await supaRest('GET','?select=data,updated_at');
    const localT=+localStorage.getItem('cinemateca_updated')||0;
    if(rows&&rows.length){
      const remoteT=new Date(rows[0].updated_at).getTime();
      if(force||remoteT>localT){
        const keep={supaUrl:S.settings.supaUrl,supaKey:S.settings.supaKey};
        S={...DEFAULTS,...rows[0].data,settings:{...DEFAULTS.settings,...(rows[0].data.settings||{}),...keep}};
        save(true);
        localStorage.setItem('cinemateca_updated',remoteT);
        showTab(currentTab);
      }else if(localT>remoteT){await pushSync();}
      localStorage.setItem('cinemateca_lastsync',Date.now());
      syncStatus='ok';
    }else{await pushSync();return;}
  }catch(e){syncStatus='err';}
  updateSyncUI();
}
async function syncSignup(){
  const email=$('sync-email').value.trim(),pass=$('sync-pass').value;
  if(!email||!pass){toast('Escribe email y contraseña');return;}
  try{
    const d=await supaAuth('signup',{email,password:pass});
    if(d.access_token){setSession(d);toast('Cuenta creada y conectada ✅');await pullSync();}
    else toast('Cuenta creada. Confirma el email (o desactiva la confirmación en Supabase) y pulsa «Iniciar sesión».');
  }catch(e){toast('Error: '+e.message);}
  renderAjustes();updateSyncUI();
}
async function syncLogin(){
  const email=$('sync-email').value.trim(),pass=$('sync-pass').value;
  if(!email||!pass){toast('Escribe email y contraseña');return;}
  try{
    const d=await supaAuth('token?grant_type=password',{email,password:pass});
    setSession(d);toast('Sesión iniciada ✅');
    await pullSync();
  }catch(e){toast('Error: '+e.message);}
  renderAjustes();updateSyncUI();
}
function syncLogout(){
  session=null;localStorage.removeItem('cinemateca_session');
  syncStatus='off';renderAjustes();updateSyncUI();
}
function saveSupa(){
  S.settings.supaUrl=$('set-supaurl').value.trim();
  S.settings.supaKey=$('set-supakey').value.trim();
  save(true);toast('Conexión guardada');renderAjustes();
}

/* ============ INICIO ============ */
renderNav();
showTab(S.settings.tmdbKey?'coleccion':'ajustes');
if(!S.settings.tmdbKey){
  setTimeout(()=>toast('👋 Bienvenido: configura tu clave TMDB para empezar'),400);
}
if('serviceWorker' in navigator&&(location.protocol==='https:'||['localhost','127.0.0.1'].includes(location.hostname))){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
if(session&&supaCfg()){pullSync();}
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&session&&supaCfg())pullSync();
});

</script>
</body>
</html>
